<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arcane Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
  <div class="nebula nebula--a" aria-hidden="true"></div>
  <div class="nebula nebula--b" aria-hidden="true"></div>
  <div class="mist" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="portal-flash" aria-hidden="true"></div>

  <main class="sanctum" id="sanctum">
    <header class="sanctum__header">
      <p class="sanctum__sigil">Arcade grimoire</p>
      <h1 class="sanctum__title">Arcane Arcade</h1>
      <p class="sanctum__lede">
        Choose a crystal sphere to cross into its game realm.
      </p>
    </header>

    <nav class="crystal-grid" id="crystal-grid" aria-label="Mini games"></nav>

    <p class="sanctum__footer">Static sanctum · crystal gateway</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
  <script src="lobby.js"></script>
</body>
</html>
